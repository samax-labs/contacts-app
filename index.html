<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Samax • Contacts Vault</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="28" height="28"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Samax • Contacts App
        </h1>
        <div class="toolbar">
            <div class="search-bar">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="globalSearch" placeholder="Search name, phone, email, notes...">
            </div>
            <button id="importBtn" class="icon-btn"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 15v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Import CSV</button>
            <button id="exportAllBtn" class="icon-btn"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export CSV</button>
            <button id="mergeBtn" class="icon-btn"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 4v12M16 4v12M3 8h12M9 16h12"/></svg> Merge</button>
            <button id="clearAllBtn" class="icon-btn" style="color:#b91c1c;"><svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> Clear All</button>
        </div>
    </div>

    <div class="filter-group" id="groupFilterContainer">
        <span class="group-chip active" data-group="all">All</span>
        <select id="sortSelect" class="sort-select">
            <option value="name">Sort by Name</option>
            <option value="date">Sort by Date (newest)</option>
            <option value="favorite">Favorites First</option>
        </select>
    </div>

    <div class="stats-bar" id="statsBar">
        <span id="contactCount">0 contacts</span>
        <div class="batch-actions">
            <button id="batchDeleteBtn" class="small-btn" style="display:none; background:#fee2e2;">Delete Selected</button>
        </div>
    </div>

    <div id="contactsContainer" class="contacts-grid"></div>
</div>

<footer class="app-footer">
    <div class="social-links">

        </a>
        <a href="https://x.com/oronosamuel" target="_blank" class="social-icon" title="X">
            <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
        </a>
        <a href="https://www.linkedin.com/in/orono-sam-90633b404/" target="_blank" class="social-icon" title="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
    </div>
    <p style="font-size: 0.8rem; color: #64748b;">&copy; 2026 Samax Contacts Vault project. All rights reserved.</p>
</footer>

<button class="fab" id="fabBtn">
    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="28" height="28"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div id="toast" class="toast"></div>

<div id="contactModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">Add Contact</h3>
        <div class="form-group"><label>Full Name *</label><input id="formName" placeholder="Name"></div>
        <div class="form-group"><label>Primary Phone</label><input id="formPhone1" placeholder="+1 234 567 8900"></div>
        <div class="form-group"><label>Secondary Phone</label><input id="formPhone2" placeholder="Optional second number"></div>
        <div class="form-group"><label>Email</label><input id="formEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>Location</label><input id="formLocation" placeholder="City, Country"></div>
        <div class="form-group"><label>Gender</label><select id="formGender"><option value="">Prefer not to say</option><option>Female</option><option>Male</option><option>Non-binary</option></select></div>
        <div class="form-group"><label>Company</label><input id="formCompany" placeholder="Organization"></div>
        <div class="form-group"><label>Group Label</label><input id="formGroup" placeholder="e.g., Family, Work, Friends"></div>
        <div class="form-group"><label>Birthday</label><input id="formBirthday" type="date" placeholder="YYYY-MM-DD"></div>
        <div class="form-group"><label>Notes</label><textarea id="formNotes" rows="2" placeholder="Additional info..."></textarea></div>
        <div class="form-group"><label>Custom Fields</label><div id="customFieldsContainer"></div><button type="button" id="addCustomFieldBtn" class="small-btn">+ Add Custom Field</button></div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1rem;">
            <button id="modalCloseBtn" class="secondary">Cancel</button>
            <button id="modalSaveBtn" class="primary">Save Contact</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
